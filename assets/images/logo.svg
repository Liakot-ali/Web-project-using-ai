<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="64" viewBox="0 0 300 64" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Liton Desk Studio</title>
  <desc id="logoDesc">A stylized desk icon with the text Liton Desk Studio</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#00b894" />
      <stop offset="100%" stop-color="#019170" />
    </linearGradient>
  </defs>

  <!-- desk icon: tabletop + pipe legs -->
  <g transform="translate(8,8)">
    <rect x="0" y="6" width="56" height="8" rx="2" fill="url(#g)" />
    <!-- left pipe leg -->
    <path d="M6 14 v14 h6 v4 h-10 v-18" fill="#333" opacity="0.9" />
    <!-- right pipe leg -->
    <path d="M50 14 v14 h6 v4 h-10 v-18" fill="#333" opacity="0.9" transform="translate(0,0)" />
    <!-- small bolt circles -->
    <circle cx="10" cy="14" r="1.6" fill="#fff" />
    <circle cx="54" cy="14" r="1.6" fill="#fff" />
  </g>

  <!-- brand text with outline for contrast on dark backgrounds -->
  <g transform="translate(80,40)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="url(#g)" stroke="#fff" stroke-width="2" paint-order="stroke fill">Liton Desk</text>
    <text x="0" y="18" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#fff" stroke="#000" stroke-opacity="0.06" stroke-width="1" paint-order="stroke fill">Studio</text>
  </g>
</svg>
