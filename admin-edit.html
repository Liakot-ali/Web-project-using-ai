<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Edit Product</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:12px;">
        <a href="index.html"><img src="assets/images/logo.svg" alt="Liton Desk Studio logo" style="height:36px"></a>
        <h2 style="color:#fff;margin:0;font-size:18px">Admin — Edit Product</h2>
      </div>
      <div>
        <a href="admin.html" class="btn" style="background:#fff;color:#111">Back to list</a>
      </div>
    </div>
  </header>

  <main class="container section" style="padding-top:20px;">
    <form id="productEditForm">
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <div style="flex:1;min-width:320px">
          <label>Title<br><input id="p_name" required></label>
          <label>Category<br>
            <select id="p_category">
              <option value="">— Select category —</option>
            </select>
          </label>
          <label>Price<br><input id="p_price" type="number" step="0.01"></label>
          <label>Priority<br><input id="p_priority" type="number"></label>
          <label>Image URL<br>
            <input id="p_image" placeholder="https://.../image.jpg">
          </label>
          <div style="margin-top:8px">
            <img id="p_image_preview" src="assets/images/placeholder.svg" alt="Preview" style="max-width:160px;max-height:120px;border:1px solid #ddd;padding:6px;background:#fff">
          </div>
          <label>Description<br><textarea id="p_desc" rows="4"></textarea></label>
        </div>
        <div style="width:320px">
          <label>Length<br><input id="p_length"></label>
          <label>Width<br><input id="p_width"></label>
          <label>Height<br><input id="p_height"></label>
          <label>Board Depth<br><input id="p_boardDepth"></label>
          <label>Frame Size<br><input id="p_frameSize"></label>
          <label>Material<br>
            <select id="p_material">
              <option value="">— Select material —</option>
              <option>Engineered Wood</option>
              <option>Solid Wood</option>
              <option>Metal</option>
              <option>Laminate</option>
            </select>
          </label>
          <label>Weight<br><input id="p_weight"></label>
          <label>Color/Finish<br>
            <select id="p_color">
              <option value="">— Select color/finish —</option>
              <option>Natural</option>
              <option>Walnut</option>
              <option>Black</option>
              <option>White</option>
              <option>Oak</option>
            </select>
          </label>
        </div>
      </div>

      <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
        <button id="saveContinue" class="btn">Save & Continue</button>
        <button id="deleteProduct" type="button" class="btn" style="background:#e06b6b">Delete Product</button>
        <a href="admin.html" class="btn" style="background:#ccc;color:#111">Back to list</a>
      </div>

      <div id="editStatus" style="margin-top:10px;color:#333"></div>
    </form>
  </main>

  <script src="assets/js/admin-edit.js"></script>
</body>
</html>
