<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Details</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .product-detail {
      padding: 40px 0;
    }
    .product-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: start;
    }
    .product-main img {
      width: 100%;
      border-radius: 8px;
      height: 420px;
      object-fit: cover;
    }
    .product-detail-desc {
      font-size: 18px;
      margin-bottom: 18px;
      max-width: 800px;
    }
    .order-primary {
      margin-top: 16px;
    }
    @media (max-width: 900px) {
      .product-main {
        grid-template-columns: 1fr;
      }
      .product-main img {
        height: 300px;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo"><h2><a href="index.html" style="color:inherit;text-decoration:none;">Liton Desk Studio</a></h2></div>
  </header>

  <main class="container product-detail">
    <a href="index.html" class="btn">← Back to products</a>

    <div id="productArea">
      <h1 id="prodName" class="section-title">Product</h1>

      <div class="product-main">
        <div>
          <img id="prodImage" src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1200&auto=format&fit=crop" alt="Product image" />
        </div>

        <div>
          <div class="product-meta">
            <div class="price" id="prodPrice">৳ 0</div>
            <p id="prodShortDesc" class="product-detail-desc"></p>
          </div>

          <h3>Specifications</h3>
          <ul class="spec-list" id="prodSpecs">
            <!-- populated by JS -->
          </ul>

          <p id="prodLongDesc" class="product-detail-desc"></p>

          <div class="order-primary">
            <button id="orderNowBtn" class="btn">Order Now</button>
            <a id="whatsappLink" href="#" class="btn" style="background:#25d366;margin-left:10px;">Order via WhatsApp</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Liton Desk Studio</div>
  </footer>

  <script src="assets/js/product.js"></script>
</body>
</html>
