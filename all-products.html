<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>All Products</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .all-products { padding: 40px 0 }
    .all-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap:18px }
    .prod-card { background:#fff; padding:12px; border-radius:8px; box-shadow:0 8px 20px rgba(0,0,0,0.06) }
    .prod-card img { width:100%; height:160px; object-fit:cover; border-radius:6px }
    .prod-meta { margin-top:8px }
    .prod-meta h4 { margin:6px 0 }
    .top-badge { display:inline-block; background:#f0f9f4; color:#019170; padding:4px 8px; border-radius:999px; font-size:12px }
  </style>
</head>
<body>
  <header class="navbar"><div class="logo"><a href="index.html"><img src="assets/images/logo.svg" alt="Liton Desk Studio logo"></a></div></header>
  <main class="container all-products">
    <h1 class="section-title">All Products</h1>
    <div id="allProductsGrid" class="all-grid"></div>
  </main>
  <footer class="footer"><div class="container">© 2026 Liton Desk Studio</div></footer>
  <script src="assets/js/seed-products.js"></script>
  <script src="assets/js/all-products.js"></script>
</body>
</html>
